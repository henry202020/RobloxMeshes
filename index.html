<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Meshes Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Roblox Meshes</h1>
        <p>Sua biblioteca premium e organizada de assets 3D</p>
    </header>

    <div class="container">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="ALL">All</button>
            <button class="filter-btn" data-filter="MESHES">Meshes</button>
            <button class="filter-btn" data-filter="TORSOS">Torsos</button>
            <button class="filter-btn" data-filter="ARMS">Arms</button>
            <button class="filter-btn" data-filter="LEGS">Legs</button>
            <button class="filter-btn" data-filter="HEAD">Head</button>
            <button class="filter-btn" data-filter="MAPS">Maps</button>
            <button class="filter-btn" data-filter="OTHERS">Others</button>
        </div>

        <div id="lista-de-meshes" class="grid-meshes"></div>

        <footer>
            <p>&copy; Roblox Meshes Hub.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
